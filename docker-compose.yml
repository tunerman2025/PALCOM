services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: change_this_strong_password
      POSTGRES_DB: app_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://app_user:change_this_strong_password@db:5432/app_db
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    # first-run setup: create schema + seed reference data (idempotent), then start
    command: >
      sh -c "node scripts/init-db.mjs && node server.js"

volumes:
  pgdata:
